name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      docker:
        description: Force CI image rebuild
        type: boolean
        default: false
      pages:
        description: Force Pages deploy
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # ################ Stage 0: detect changed paths ################
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker == 'true' || inputs.docker }}
      web: ${{ steps.filter.outputs.web == 'true' || inputs.pages }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
        with:
          filters: |
            docker:
              - 'docker/**'
              - 'tests/package-lock.json'
            web:
              - 'web/**'

  # ################ Stage 1: CI image, only when docker files change ################
  docker:
    name: Build and push CI image
    needs: changes
    if: needs.changes.outputs.docker == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/ci:latest
            ghcr.io/${{ steps.repo.outputs.name }}/ci:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ################ Stage 2: format + docs + tidy ################
  checks:
    name: Checks (format + docs + tidy)
    needs: [changes, docker]
    if: >-
      !cancelled() &&
      needs.changes.result == 'success' &&
      (needs.docker.result == 'success' || needs.docker.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    container:
      image: ghcr.io/beratatmaca/aetherproxy/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: build-release
          key: checks-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: checks-

      - name: Configure
        run: |
          bash tools/embed-assets.sh
          cmake --preset release

      - name: Check formatting
        run: cmake --build build-release --target format-check

      - name: Build docs
        run: cmake --build build-release --target docs

      - name: Run clang-tidy
        run: cmake --build build-release --target lint

  # ################ Stage 3: build + integration tests ################
  build-test:
    name: Build + integration tests (Release)
    needs: checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ghcr.io/beratatmaca/aetherproxy/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: build-release
          key: build-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: build-

      - name: Build
        run: |
          bash tools/embed-assets.sh
          cmake --preset release
          cmake --build --preset release --parallel "$(nproc)"

      - name: Link binary for test runner
        run: |
          mkdir -p build
          ln -sf "$PWD/build-release/aetherproxy" build/aetherproxy

      - name: Install test dependencies
        working-directory: tests
        run: |
          npm ci
          npx playwright install chromium firefox

      - name: Run integration tests
        run: bash tools/run-tests.sh

  # ################ Stage 3: sanitizers ################
  sanitizers:
    name: Sanitizer smoke test (${{ matrix.mode }})
    needs: checks
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    container:
      image: ghcr.io/beratatmaca/aetherproxy/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        mode: [asan, tsan]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            build-debug
            build-tsan
          key: ${{ matrix.mode }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: ${{ matrix.mode }}-

      - name: Run ${{ matrix.mode }} smoke test
        run: bash tools/run-tests.sh --${{ matrix.mode }}

  # ################ Stage 4: static release binaries, tags only ################
  release-build:
    name: Static build — ${{ matrix.arch }}
    needs: [build-test, sanitizers]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build fully static musl binary in Alpine
        run: |
          docker run --rm -v "$PWD:/work" -w /work alpine:3.21 sh -euc '
            apk add --no-cache build-base cmake samurai bash xxd git ca-certificates \
              linux-headers python3 openssl-dev openssl-libs-static file
            bash tools/embed-assets.sh
            cmake --preset release-static
            cmake --build --preset release-static --parallel "$(nproc)"
            file build-release-static/aetherproxy | grep -q "statically linked"
            ./build-release-static/aetherproxy --version
          '

      - name: Rename binary for release
        run: |
          cp build-release-static/aetherproxy aetherproxy-linux-${{ matrix.arch }}
          chmod +x aetherproxy-linux-${{ matrix.arch }}

      - name: Package .deb
        run: |
          bash tools/build-deb.sh \
            --arch ${{ matrix.arch }} \
            --binary aetherproxy-linux-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: |
            aetherproxy-linux-${{ matrix.arch }}
            dist/*.deb
          retention-days: 1

  # ################ Stage 5: draft GitHub Release ################
  release:
    name: Draft GitHub Release
    needs: release-build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: AetherProxy ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## AetherProxy ${{ steps.version.outputs.version }}

            ### Install (one-liner)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/tools/install.sh | bash
            ```

            ### Manual download
            | Platform | File |
            |---|---|
            | Linux x86_64 | `aetherproxy-linux-amd64` |
            | Linux ARM64  | `aetherproxy-linux-arm64` |
            | Debian/Ubuntu x86_64 | `aetherproxy_${{ steps.version.outputs.version }}_amd64.deb` |
            | Debian/Ubuntu ARM64  | `aetherproxy_${{ steps.version.outputs.version }}_arm64.deb` |

            ### Changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
          files: dist/**

  # ################ Stage 4: GitHub Pages, only when web/ changes ################
  pages:
    name: Deploy to GitHub Pages
    needs: [changes, build-test, sanitizers]
    if: >-
      needs.changes.outputs.web == 'true' &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
