name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Release build + Playwright integration tests ─────────────────────────────
  integration:
    name: Integration tests (Release / GCC)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libssl-dev libsrtp2-dev \
            libqrencode-dev \
            python3 \
            xvfb

      - name: Cache CMake FetchContent downloads
        uses: actions/cache@v4
        with:
          path: ~/.cmake
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-${{ runner.os }}-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install Node test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium firefox

      - name: Configure (Release)
        run: cmake --preset gcc-release -G Ninja

      - name: Embed assets
        run: bash tools/embed-assets.sh

      - name: Build (Release)
        run: cmake --build --preset gcc-release

      - name: Symlink binary for test runner
        run: |
          mkdir -p build
          ln -sf "$PWD/build-gcc-release/aetherproxy" build/aetherproxy

      - name: Run integration tests
        run: bash tools/run-tests.sh
        env:
          # Playwright needs a display for some browser operations even in headless mode.
          DISPLAY: ':99'

  # ── AddressSanitizer build ────────────────────────────────────────────────────
  asan:
    name: ASan build (Debug / GCC)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libssl-dev libsrtp2-dev \
            libqrencode-dev \
            python3

      - name: Cache CMake FetchContent downloads
        uses: actions/cache@v4
        with:
          path: ~/.cmake
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-${{ runner.os }}-

      - name: Configure (ASan / Debug)
        run: cmake --preset gcc-asan -G Ninja

      - name: Embed assets
        run: bash tools/embed-assets.sh

      - name: Build (ASan)
        run: cmake --build --preset gcc-asan

      - name: Smoke-test under ASan (start + room-code)
        # Runs the binary for 3 seconds; ASan aborts on the first heap error.
        # We assert it printed a room code before being killed.
        run: |
          ASAN_OPTIONS=detect_leaks=0 timeout 3 \
            build-gcc-asan/aetherproxy --port 8096 2>&1 | tee /tmp/asan-out.txt || true
          grep -E '[a-z]+-[a-z]+-[a-z]+-[0-9]{5}' /tmp/asan-out.txt \
            || { echo "ASan binary did not emit a room code"; exit 1; }
          echo "ASan smoke-test passed."
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1

  # ── ThreadSanitizer build ─────────────────────────────────────────────────────
  tsan:
    name: TSan build (Clang)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build \
            libssl-dev libsrtp2-dev \
            libqrencode-dev \
            python3

      - name: Cache CMake FetchContent downloads
        uses: actions/cache@v4
        with:
          path: ~/.cmake
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-${{ runner.os }}-

      - name: Configure (TSan / Clang)
        run: cmake --preset clang-tsan -G Ninja

      - name: Embed assets
        run: bash tools/embed-assets.sh

      - name: Build (TSan)
        run: cmake --build --preset clang-tsan

      - name: Smoke-test under TSan (start + room-code)
        # Runs the binary for 3 seconds; TSan aborts on detected data races.
        run: |
          TSAN_OPTIONS=halt_on_error=1 timeout 3 \
            build-clang-tsan/aetherproxy --port 8097 2>&1 | tee /tmp/tsan-out.txt || true
          grep -E '[a-z]+-[a-z]+-[a-z]+-[0-9]{5}' /tmp/tsan-out.txt \
            || { echo "TSan binary did not emit a room code"; exit 1; }
          echo "TSan smoke-test passed."
        env:
          TSAN_OPTIONS: halt_on_error=1
