name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ################ Stage 1: format + docs + tidy ################
  checks:
    name: Checks (format + docs + tidy)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    container:
      image: ghcr.io/beratatmaca/aetherproxy/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: build-release
          key: checks-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: checks-

      - name: Configure
        run: |
          bash tools/embed-assets.sh
          cmake --preset release

      - name: Check formatting
        run: cmake --build build-release --target format-check

      - name: Build docs
        run: cmake --build build-release --target docs

      - name: Run clang-tidy
        run: cmake --build build-release --target lint

  # ################ Stage 2: GCC build + integration tests ################
  build-test:
    name: Build + integration tests (GCC Release)
    needs: checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ghcr.io/beratatmaca/aetherproxy/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: build-release
          key: build-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: build-

      - name: Build
        run: |
          bash tools/embed-assets.sh
          cmake --preset release
          cmake --build --preset release --parallel "$(nproc)"

      - name: Link binary for test runner
        run: |
          mkdir -p build
          ln -sf "$PWD/build-release/aetherproxy" build/aetherproxy

      - name: Install test dependencies
        working-directory: tests
        run: |
          npm ci
          npx playwright install chromium firefox

      - name: Run integration tests
        run: bash tools/run-tests.sh

  # ################ Stage 2: sanitizers ################
  sanitizers:
    name: Sanitizer smoke test (${{ matrix.mode }})
    needs: checks
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    container:
      image: ghcr.io/beratatmaca/aetherproxy/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        mode: [asan, tsan]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            build-debug
            build-tsan
          key: ${{ matrix.mode }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: ${{ matrix.mode }}-

      - name: Run ${{ matrix.mode }} smoke test
        run: bash tools/run-tests.sh --${{ matrix.mode }}
