name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ################ Fully static musl binaries ################
  build:
    name: Static build — ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build fully static musl binary in Alpine
        run: |
          docker run --rm -v "$PWD:/work" -w /work alpine:3.21 sh -euc '
            apk add --no-cache build-base cmake bash xxd git ca-certificates \
              linux-headers python3 openssl-dev openssl-libs-static file
            bash tools/embed-assets.sh
            cmake -B build-release -DCMAKE_BUILD_TYPE=Release -DSTATIC_BUILD=ON
            cmake --build build-release --parallel "$(nproc)"
            file build-release/aetherproxy | grep -q "statically linked"
            ./build-release/aetherproxy --version
          '

      - name: Rename binary for release
        run: |
          cp build-release/aetherproxy aetherproxy-linux-${{ matrix.arch }}
          chmod +x aetherproxy-linux-${{ matrix.arch }}

      - name: Package .deb
        run: |
          bash tools/build-deb.sh \
            --arch ${{ matrix.arch }} \
            --binary aetherproxy-linux-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: |
            aetherproxy-linux-${{ matrix.arch }}
            dist/*.deb
          retention-days: 1

  # ################ Draft GitHub Release with all assets ################
  release:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: AetherProxy ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## AetherProxy ${{ steps.version.outputs.version }}

            ### Install (one-liner)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/tools/install.sh | bash
            ```

            ### Manual download
            | Platform | File |
            |---|---|
            | Linux x86_64 | `aetherproxy-linux-amd64` |
            | Linux ARM64  | `aetherproxy-linux-arm64` |
            | Debian/Ubuntu x86_64 | `aetherproxy_${{ steps.version.outputs.version }}_amd64.deb` |
            | Debian/Ubuntu ARM64  | `aetherproxy_${{ steps.version.outputs.version }}_arm64.deb` |

            ### Changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
          files: dist/**
